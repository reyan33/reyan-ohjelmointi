<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <title>Tehtävälista</title>
    <link rel="stylesheet" href="../portfolio/style.css" />
<style>
      #taskList li {
        padding: 10px;
        margin-bottom: 10px;
        background: #fff8f2;
        border-left: 4px solid #e86a33;
        border-radius: 6px;
        transition: 0.3s;
      }

      #taskList li::before {
        content: "➤";
        color: #e86a33;
        margin-right: 10px;
      }

      #taskList li:hover {
        transform: translateX(5px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
    </style>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <main class="bg-light d-flex justify-content-center p-4">
    <div
      class="bg-white p-4 rounded-4 shadow-lg w-100"
      style="max-width: 700px"
    >
      <h1 class="mb-4" style="color: #e86a33">Tehtävälista</h1>
      <header>
        <nav>
          <button>
            <a href="../portfolio/index.html">Portfolio</a>
          </button>
          <button><a href="../portfolio/cv.html">CV</a></button>
          <button>
            <a href="../portfolio/työkokemus.html">Työ kokemus</a>
          </button>
          <button><a href="../portfolio/media.html">Esittely video</a></button>
          <button><a href="../portfolio/flex.html">Flex-harjoitus</a></button>
          <button>
            <a href="../portfolio/grid.html">Takaisin Etusivuun</a>
          </button>
          <button>
            <a href="../portfolio/henkilotiedot_loukat.html">Henkilötiedot Loukat</a>
          </button>
          <button><a href="../portfolio/kasino.html">Kasino</a></button>
          <button>
            <a href="../merkkijonot/merkkijonot.html">Merkkijono</a>
          </button>
          <button><a href="../muuttujat/muuttujat.html">Muuttujat</a></button>
          <button>
            <a href="../portfolio/henkilötiedot.html">Henkiötiedot</a>
          </button>
          <button>
            <a href="../taulukot/taulukot.html">Taulukot</a>
          </button>
        </nav>
      </header>

      <div class="input-group mb-3">
        <input
          type="text"
          id="taskInput"
          class="form-control"
          placeholder="Kirjoita tehtävä"
        />

        <input
          type="number"
          id="countInput"
          class="form-control"
          placeholder="Määrä"
        />

        <button
          class="btn text-white"
          style="background-color: #e86a33"
          onclick="addTask()"
        >
          Lisää
        </button>
      </div>

      <ul id="taskList" class="list-unstyled"></ul>
      <footer>
        <p>© 2026 Reyan</p>
      </footer>
    </main>

    <script src="./tehtava.js"></script>

    
  </body>
</html>
