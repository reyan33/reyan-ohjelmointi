<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animaatiot</title>
    <link rel="stylesheet" href="animation.css">
</head>
<body>

    <h1>CSS Animaatiot</h1>

    <!-- Spinner -->
    <section>
        <h2>Spinner</h2>
        <div class="spinner"></div>
    </section>

    <!-- Liikkuvat laatikot -->
    <section>
        <h2>Liikkuvat laatikot</h2>
        <div class="container">
            <div class="box"></div>
        </div>
    </section>

    <!-- Progress Bar -->
    <section>
        <h2>Progress Bar</h2>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </section>

    <!-- Pulsing Loader -->
    <section>
        <div class="pulse-loader"></div>
    </section>

    <section>
      <div class="loader">
          <img src="image.gif" alt="Loading...">
      </div>
</section>

</body>
</html>
