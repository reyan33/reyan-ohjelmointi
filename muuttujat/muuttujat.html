<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Muuttujia ja tietotyyppejä</title>
    <link rel="stylesheet" href="../portfolio/style.css">
    <link rel="stylesheet" href="muuttuujat.css">
</head>
<body>

<main class="container">

    <h1>Muuttujia ja tietotyyppejä</h1>

    <section>
        <h2>Muuttujat</h2>

        <button onclick="summa()">Summa</button>
        <button onclick="vahennys()">Vähennys</button>
        <button onclick="kerto()">Kerto</button>
        <button onclick="jako()">Jako</button>
    </section>
    
    <hr>

    <section>

    <h2>Laskin</h2>

    <input type="number" id="numero1" placeholder="Ensimmäinen numero">
    <input type="number" id="numero2" placeholder="Toinen numero">

    <br><br>

    <button onclick="laskin_summa()">+</button>
    <button onclick="laskin_vahennys()">-</button>
    <button onclick="laskin_kerto()">*</button>
    <button onclick="laskin_jako()">/</button>
</section>

<hr>

<section>
    <h2>Päivämäärä</h2>

    <button onclick="naytaPaivamaara()">Näytä päivämäärä</button>

    <div id="paivamaara"></div>
    <div id="aika"></div>
    <div id="paivaJaAika"></div>
    <div id="viikonpaiva"></div>
    <div id="kuukausi"></div>
</section>

<hr>

<section id="veijo">
    <h2>Veijo</h2>
    <ul></ul>
</section>

<section id="elvira">
    <h2>Elvira</h2>
    <ul></ul>
</section>

<section id="mehdi">
    <h2>Mehdi</h2>
    <ul></ul>
</section>

<section id="tuuli">
    <h2>Tuuli</h2>
    <ul></ul>
</section>

<h3>Veijo + Tuuli</h3>
<ul id="veijotuuli"></ul>

<h3>Mehdi & Elvira</h3>
<ul id="mehdielvira"></ul>

<h3>Elvira vs Tuuli</h3>
<ul id="elviratuuli"></ul>

</main>

<script src="muuttujat.js" defer></script>

</body>
</html>
