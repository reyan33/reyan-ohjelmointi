<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Objekt-harjoitus</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="henkilötiedot.css">
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Henkilötiedot</h1>

    <a href="index.html">
      <button>Takaisin Portfolioon</button>
    </a>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Nimi</th>
          <th>Ikä</th>
          <th>Työ</th>
          <th>Ajokortti</th>
        </tr>
      </thead>
      <tbody id="rivit"></tbody>
    </table>
  </div>
    <h3>Lisää henkilö</h3>

  <input type="text" id="nimi" placeholder="Nimi">
  <input type="number" id="ika" placeholder="Ikä">
  <input type="text" id="tyo" placeholder="Työ">

  <label>
    <input type="checkbox" id="ajokortti"> Ajokortti
  </label>

  <br><br>

  <button onclick="lisaaHenkilo()">Lähetä</button>

</div>

<script src="henkilotiedot.js"></script>
</body>
</html>
