<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <title>Moe Szyslak</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="main-content">
      <div class="title-row">
        <img src="images/logo.svg" class="logo" />

        <header>
          <nav>
            <a href="index.html">Home</a>
            <a href="springfield.html">Springfield</a>
            <a href="hahmo.html">Characters</a>
            <a href="forum.html">Forum</a>
          </nav>
        </header>
      </div>

      <h1>Moe Szyslak</h1>

      <!-- CHARACTER IMAGE -->
      <div class="character-detail-layout">
        <div class="character-photo-wrap">
          <img
            src="images/moe_e.png"
            alt="Moe Szyslak"
            class="character-photo"
          />
        </div>
        <div class="character-detail-right">
          <!-- TABS -->
          <div class="tabs">
            <button onclick="showTab('info')">Info</button>
            <button onclick="showTab('memes')">Memes</button>
          </div>

          <!-- INFO -->
          <section id="info" class="tab active">
            <div class="info-top">
              <div>
                <h2>Morris "Moe" Szyslak</h2>
                <p>
                  Moe Szyslak is the grumpy bartender and owner of Moe's Tavern.
                  He runs the bar with a rough attitude but a surprisingly warm
                  heart under the surface.
                </p>
              </div>
              <div class="voice-actor-card">
                <div class="actor-photo">
                  <img src="images/HankA.png" alt="Hank Azaria / Moe" />
                </div>
                <div>
                  <h3>Voice Actor</h3>
                  <p>Hank Azaria</p>
                  <a
                    href="https://www.imdb.com/name/nm0000279/?ref_=fn_t_1"
                    target="_blank"
                  >
                    IMDb Profile
                  </a>
                </div>
              </div>
            </div>

            <div class="audio-grid">
              <h3>Audio clips</h3>
              <div class="audio-row">
                <audio controls>
                  <source src="audio/Moe1.wav" type="audio/mpeg" />
                </audio>
                <audio controls>
                  <source src="audio/Moe2.wav" type="audio/mpeg" />
                </audio>
              </div>
            </div>
          </section>

          <!-- MEMES -->
          <section id="memes" class="tab">
            <div class="meme-grid">
              <img src="memes/moe/image1.png" onclick="openMeme(this)" />
              <img src="memes/moe/image2.png" onclick="openMeme(this)" />
              <img src="memes/moe/image3.png" onclick="openMeme(this)" />
              <img src="memes/moe/image4.png" onclick="openMeme(this)" />
              <img src="memes/moe/image5.png" onclick="openMeme(this)" />
            </div>

            <div id="meme-viewer" onclick="closeMeme(event)"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="characters.js"></script>
  </body>
</html>
