<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Muuttujia ja tietotyyppejä</title>
    <link rel="stylesheet" href="../portfolio/style.css">
</head>
<body>

<main class="container">

    <h1>Muuttujia ja tietotyyppejä</h1>

    <section>
        <h2>Muuttujat</h2>

        <button onclick="summa()">Summa</button>
        <button onclick="vahennys()">Vähennys</button>
        <button onclick="kerto()">Kerto</button>
        <button onclick="jako()">Jako</button>
    </section>
    
    <hr>

    <section>

    <h2>Laskin</h2>

    <input type="number" id="numero1" placeholder="Ensimmäinen numero">
    <input type="number" id="numero2" placeholder="Toinen numero">

    <br><br>

    <button onclick="laskin_summa()">+</button>
    <button onclick="laskin_vahennys()">-</button>
    <button onclick="laskin_kerto()">*</button>
    <button onclick="laskin_jako()">/</button>
</section>

</main>

<script src="muuttujat.js" defer></script>

</body>
</html>
