<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <title>Merkkijonot</title>
    <link rel="stylesheet" href="../portfolio/style.css" />
    <link rel="stylesheet" href="merkkijonot.css" />
  </head>

  <body>
    <main class="container">
      <h1>Merkkijonot</h1>

      <hr />

      <h2>Poimi kirjain</h2>

      <input type="text" id="teksti1" placeholder="Teksti" />
      <input type="number" id="numero1" placeholder="Indeksi" />

      <button onclick="poimiKirjain()">Näytä</button>

      <div id="tulos1"></div>

      <hr />

      <h2>Löydä indeksi</h2>

      <input type="text" id="teksti2" placeholder="Teksti" />
      <input type="text" id="hakusana" placeholder="Haku sana" />

      <button onclick="loydaIndeksi()">Näytä</button>

      <div id="tulos2"></div>

      <hr />

      <h2>Leikkaa merkkijono</h2>

      <input type="text" id="teksti3" placeholder="Teksti" />
      <input type="number" id="alku" placeholder="1st no." />
      <input type="number" id="loppu" placeholder="2nd no." />

      <button onclick="leikkaaMerkkijono()">Näytä</button>

      <div id="tulos3"></div>

      <hr />

      <h2>Etsi ja korvaa</h2>

      <input type="text" id="teksti4" placeholder="Teksti" />
      <input type="text" id="etsi" placeholder="Etsi" />
      <input type="text" id="korvaa" placeholder="Korvaa" />

      <button onclick="etsiJaKorvaa()">Näytä</button>

      <div id="tulos4"></div>

      <hr />

      <h2>Poikki ja pinoon</h2>

      <input type="text" id="teksti5" placeholder="Teksti" />
      <input type="text" id="jakaja" placeholder="Jakaja" />

      <button onclick="poikkiJaPinoon()">Näytä</button>

      <ul id="tulos5"></ul>
    </main>

    <script src="merkkijonot.js"></script>
  </body>
</html>
